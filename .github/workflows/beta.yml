name: Beta

on:
  schedule:
    # new Rust versions are released on Thursdays -> run every Friday at 12pm
    - cron: "0 12 * * FRI"
  workflow_call:
  workflow_dispatch:

env:
  RUSTFLAGS: --deny warnings
  # System tests cause error "PAExec failed with exit code -1073740791" on GitHub runners
  WNF_SYSTEM_TESTS_ENABLED: 0

jobs:
  test:
    name: Test (on beta)
    runs-on: windows-latest

    steps:
      - name: Install beta toolchain
        uses: dtolnay/rust-toolchain@beta

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        run: cargo test --all-features
